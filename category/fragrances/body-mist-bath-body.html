  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('../../products.json');

        renderCategoryProducts(filtered);

        document.getElementById('products-grid').innerHTML = '<div style="color:#e53935;font-weight:600;text-align:center;padding:32px;">Failed to load products.</div>';
