<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <meta name="description" content="Three-wick candles for longer burn times and stronger scent throw. Shop 3-wick candles at ShopAida." />
  <meta name="keywords" content="3-wick candle, scented candle, ShopAida">
  <link rel="canonical" href="https://example.com/category/fragrances/candles-3-wick.html">

</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">ShopAida</div>
      <nav>
        <a href="../../categories.html">Categories</a>
        <a href="../../index.html">Shop</a>
      </nav>
    </div>
  </header>
  <main style="max-width:1000px;margin:48px auto;">
    <h1 style="color:var(--primary);">Candles — 3 wick</h1>
    <p style="color:#555;font-size:1rem;">Larger candles with three wicks for an even, powerful scent experience.</p>

  </main>
  <footer class="footer-content">&copy; 2026 ShopAida</footer>
  <script src="../../script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('../../products.json');
        const list = await res.json();
        const filtered = list.filter(p => p.subcategory === 'Candles — 3 wick');
        renderCategoryProducts(filtered);
      } catch (e) {
        document.getElementById('products-grid').innerHTML = '<div style="color:#e53935;font-weight:600;text-align:center;padding:32px;">Failed to load products.</div>';
      }
    });
  </script>
</body>
